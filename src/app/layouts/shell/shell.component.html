@let isCollapsed = collapsed();
@let showLabels = !isCollapsed;

<div class="flex h-svh bg-bg">
  <aside
    class="surface-dark bg-nav text-sidenav-text flex flex-col overflow-hidden transition-all duration-200 ease-in-out shrink-0"
    [class.w-64]="!isCollapsed"
    [class.w-20]="isCollapsed"
  >
    <div
      class="flex items-center gap-3 px-4 py-4 border-b border-white/10 shrink-0"
      [class.justify-center]="isCollapsed"
    >
      <app-logo [size]="24" [iconSize]="48" [showWordmark]="showLabels" />
    </div>

    <nav
      class="flex flex-col gap-1 px-2 py-3 flex-1 overflow-y-auto"
      aria-label="Navegação principal"
    >
      @for (item of nav; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-white/10 text-white"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          [matTooltip]="isCollapsed ? item.label : ''"
          matTooltipPosition="right"
          matTooltipShowDelay="120"
          class="flex items-center gap-3 h-11 rounded-lg hover:bg-white/5 hover:text-white transition-colors"
          [class.justify-center]="isCollapsed"
          [class.px-3]="!isCollapsed"
        >
          <mat-icon class="shrink-0">{{ item.icon }}</mat-icon>
          @if (showLabels) {
            <span class="font-medium text-sm truncate">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <nav
      class="flex flex-col gap-1 px-2 py-3 border-t border-white/10 shrink-0"
      aria-label="Ações de conta"
    >
      @for (item of bottomActions; track item.action) {
        <button
          type="button"
          (click)="onSecondaryAction(item.action)"
          [matTooltip]="isCollapsed ? item.label : ''"
          matTooltipPosition="right"
          matTooltipShowDelay="120"
          class="flex items-center gap-3 h-11 rounded-lg hover:bg-white/5 hover:text-white transition-colors text-left"
          [class.justify-center]="isCollapsed"
          [class.px-3]="!isCollapsed"
        >
          <mat-icon class="shrink-0">{{ item.icon }}</mat-icon>
          @if (showLabels) {
            <span class="font-medium text-sm truncate">{{ item.label }}</span>
          }
        </button>
      }
    </nav>
  </aside>

  <div class="flex-1 min-w-0 flex flex-col">
    <header
      class="flex items-center justify-between gap-2 h-14 px-3 md:px-6 border-b border-line bg-paper shrink-0"
    >
      <button
        mat-icon-button
        type="button"
        (click)="toggleCollapse()"
        [attr.aria-expanded]="!isCollapsed"
        [attr.aria-label]="isCollapsed ? 'Expandir menu' : 'Recolher menu'"
      >
        <mat-icon
          class="transition-transform duration-200"
          [class.rotate-180]="isCollapsed"
        >chevron_left</mat-icon>
      </button>

      <button
        mat-icon-button
        type="button"
        (click)="logout()"
        aria-label="Sair"
      >
        <mat-icon>logout</mat-icon>
      </button>
    </header>

    <main class="flex-1 overflow-auto px-4 py-4 md:px-8 md:py-6">
      <router-outlet />
    </main>
  </div>
</div>
