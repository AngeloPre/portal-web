name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # para push no branch gh-pages

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build + Deploy (angular-cli-ghpages)
        run: |
          npx ng deploy \
            --base-href=/portal-web/ \
            --branch=gh-pages \
            --name="github-actions[bot]" \
            --email="github-actions[bot]@users.noreply.github.com" \
            --repo=https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/AngeloPre/portal-web.git \
            --no-silent